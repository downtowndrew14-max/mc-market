<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>heart market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080808;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* ── Particle canvas ── */
    #canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Content ── */
    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 20px;
    }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(64px, 12vw, 110px);
      color: #fff;
      letter-spacing: -2px;
      text-shadow:
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 40px #ffb3cc,
        0 0 80px #d63771,
        0 0 120px #d63771;
      animation: pulse 3s ease-in-out infinite;
      user-select: none;
    }

    .logo-heart {
      font-size: clamp(40px, 7vw, 70px);
      margin-right: 6px;
      text-shadow:
        0 0 10px #fff,
        0 0 30px #ff6fa8,
        0 0 60px #d63771,
        0 0 100px #d63771;
      animation: heartbeat 1.4s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes pulse {
      0%, 100% {
        text-shadow:
          0 0 10px #fff,
          0 0 20px #fff,
          0 0 40px #ffb3cc,
          0 0 80px #d63771,
          0 0 120px #d63771;
      }
      50% {
        text-shadow:
          0 0 5px #fff,
          0 0 15px #ffb3cc,
          0 0 30px #ff6fa8,
          0 0 60px #d63771;
      }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.15); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.1); }
      70%       { transform: scale(1); }
    }

    /* ── Orbit ring under logo ── */
    .orbit {
      position: absolute;
      bottom: -14px;
      width: 70%;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.18);
      box-shadow: 0 0 10px rgba(214,55,113,0.4);
      animation: orbit-glow 3s ease-in-out infinite;
    }

    @keyframes orbit-glow {
      0%, 100% { box-shadow: 0 0 10px rgba(214,55,113,0.4); }
      50%       { box-shadow: 0 0 20px rgba(214,55,113,0.8), 0 0 40px rgba(214,55,113,0.3); }
    }

    /* ── Tagline ── */
    .tagline {
      font-size: clamp(12px, 2vw, 15px);
      color: rgba(255,255,255,0.35);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 300;
    }

    /* ── Divider ── */
    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(214,55,113,0.6), transparent);
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 280px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .btn:hover::before { opacity: 1; }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn-discord {
      background: rgba(88, 101, 242, 0.12);
      border: 1px solid rgba(88, 101, 242, 0.35);
      color: #a8b0ff;
    }
    .btn-discord::before {
      background: rgba(88, 101, 242, 0.08);
    }
    .btn-discord:hover {
      border-color: rgba(88, 101, 242, 0.7);
      box-shadow: 0 0 20px rgba(88,101,242,0.25);
      color: #c5caff;
    }

    .btn-site {
      background: rgba(214, 55, 113, 0.12);
      border: 1px solid rgba(214, 55, 113, 0.35);
      color: #ffb3cc;
    }
    .btn-site::before {
      background: rgba(214, 55, 113, 0.08);
    }
    .btn-site:hover {
      border-color: rgba(214, 55, 113, 0.7);
      box-shadow: 0 0 20px rgba(214,55,113,0.25);
      color: #ffd6e7;
    }

    .btn-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── Account type badges ── */
    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
      letter-spacing: 0.5px;
      opacity: 0.8;
    }

    .badge-og     { background: rgba(245,158,11,0.1);  border: 1px solid rgba(245,158,11,0.3);  color: #fcd34d; }
    .badge-semi   { background: rgba(59,130,246,0.1);  border: 1px solid rgba(59,130,246,0.3);  color: #93c5fd; }
    .badge-minecon{ background: rgba(168,85,247,0.1);  border: 1px solid rgba(168,85,247,0.3);  color: #d8b4fe; }
    .badge-3l     { background: rgba(6,182,212,0.1);   border: 1px solid rgba(6,182,212,0.3);   color: #67e8f9; }

    /* ── Footer ── */
    .footer {
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* ── Fade in ── */
    .wrap > * {
      animation: fadein 0.8s ease both;
    }
    .wrap > *:nth-child(1) { animation-delay: 0.1s; }
    .wrap > *:nth-child(2) { animation-delay: 0.25s; }
    .wrap > *:nth-child(3) { animation-delay: 0.35s; }
    .wrap > *:nth-child(4) { animation-delay: 0.45s; }
    .wrap > *:nth-child(5) { animation-delay: 0.55s; }
    .wrap > *:nth-child(6) { animation-delay: 0.65s; }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="wrap">

  <div class="logo-wrap">
    <div class="logo">
      <span class="logo-heart">🤍</span>heart market
    </div>
    <div class="orbit"></div>
  </div>

  <p class="tagline">Minecraft Account Marketplace</p>

  <div class="divider"></div>

  <div class="badges">
    <span class="badge badge-og">⭐ OG</span>
    <span class="badge badge-semi">💎 Semi-OG</span>
    <span class="badge badge-minecon">🎭 Minecon</span>
    <span class="badge badge-3l">🔤 3-Letter</span>
  </div>

  <div class="buttons">
    <a href="https://discord.gg/PzUD4skrJn" target="_blank" class="btn btn-discord">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
      </svg>
      Join Discord
    </a>
    <a href="https://heartmarket.vercel.app" target="_blank" class="btn btn-site">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      Browse Listings
    </a>
  </div>

  <p class="footer">free to list &nbsp;·&nbsp; verified accounts &nbsp;·&nbsp; est. 2026</p>

</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let W, H, particles = [], mouse = { x: -999, y: -999 };

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  // Spawn a sparkle particle
  function spawn(x, y, forced) {
    const angle  = Math.random() * Math.PI * 2;
    const speed  = forced ? Math.random() * 1.5 + 0.5 : Math.random() * 0.6 + 0.2;
    const colors = ['#ffffff', '#ffb3cc', '#ff6fa8', '#d63771', '#ffd6e7'];
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - (forced ? 0.5 : 0.1),
      alpha: 1,
      size: forced ? Math.random() * 3 + 1 : Math.random() * 2 + 0.5,
      color: colors[Math.floor(Math.random() * colors.length)],
      decay: forced ? Math.random() * 0.015 + 0.008 : Math.random() * 0.008 + 0.004,
      twinkle: Math.random() * Math.PI * 2,
    });
  }

  // Ambient sparkles around center
  function spawnAmbient() {
    const cx = W / 2, cy = H / 2;
    const spread = Math.min(W, H) * 0.35;
    const x = cx + (Math.random() - 0.5) * spread * 2;
    const y = cy + (Math.random() - 0.5) * spread;
    spawn(x, y, false);
  }

  // Mouse trail
  let lastMouse = { x: -999, y: -999 };
  window.addEventListener('mousemove', e => {
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 8) {
      for (let i = 0; i < 3; i++) spawn(e.clientX, e.clientY, true);
      lastMouse = { x: e.clientX, y: e.clientY };
    }
  });

  let frame = 0;
  function tick() {
    ctx.clearRect(0, 0, W, H);

    // Ambient spawn rate
    if (frame % 4 === 0) spawnAmbient();
    frame++;

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy -= 0.005; // slight float up
      p.alpha -= p.decay;
      p.twinkle += 0.1;

      if (p.alpha <= 0) { particles.splice(i, 1); continue; }

      const flicker = 0.7 + 0.3 * Math.sin(p.twinkle);
      ctx.save();
      ctx.globalAlpha = p.alpha * flicker;

      // Star shape
      ctx.beginPath();
      const s = p.size;
      ctx.moveTo(p.x, p.y - s * 2);
      ctx.lineTo(p.x + s * 0.4, p.y - s * 0.4);
      ctx.lineTo(p.x + s * 2, p.y);
      ctx.lineTo(p.x + s * 0.4, p.y + s * 0.4);
      ctx.lineTo(p.x, p.y + s * 2);
      ctx.lineTo(p.x - s * 0.4, p.y + s * 0.4);
      ctx.lineTo(p.x - s * 2, p.y);
      ctx.lineTo(p.x - s * 0.4, p.y - s * 0.4);
      ctx.closePath();
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.fill();
      ctx.restore();
    }

    requestAnimationFrame(tick);
  }
  tick();
</script>

</body>
</html>
